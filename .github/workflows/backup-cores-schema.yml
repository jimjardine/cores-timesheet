name: Backup Cores schema

on:
  schedule:
    - cron: '0 8 * * *'   # ~4-5am Atlantic, low traffic
  workflow_dispatch: {}    # allow manual trigger too

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Check SUPABASE_DB_URL is set
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::SUPABASE_DB_URL secret is not set — add it under Settings > Secrets and variables > Actions. Without it, pg_dump silently falls back to a local socket and fails with a confusing 'connection to server on socket ... failed' error instead of this clear message."
            exit 1
          fi
      - name: Dump Cores schema
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          # supabase db dump's own --schema matching couldn't find "Cores" (mixed-case
          # schema name) even though psql over this same connection sees it fine — call
          # pg_dump directly (bundled in the same official Postgres image) instead of
          # routing through that wrapper's own schema-matching logic.
          docker run --rm ghcr.io/supabase/postgres:17.6.1.143 \
            pg_dump "$SUPABASE_DB_URL" --schema='"Cores"' --no-owner --no-privileges \
            > cores_backup_$(date +%Y%m%d_%H%M%S).sql
      - uses: actions/upload-artifact@v4
        with:
          name: cores-schema-backup
          path: cores_backup_*.sql
          retention-days: 90
